<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Fastfood Bonnetje</title>
<style>
    body {
        background-color: #e5e5e5;
        font-family: 'Courier New', monospace;
    }

    .receipt {
        width: 300px;
        background: #fff;
        margin: 40px auto;
        padding: 20px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        border-radius: 5px;
    }

    .center {
        text-align: center;
    }

    .divider {
        border-top: 1px dashed #000;
        margin: 10px 0;
    }

    .item {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        margin-bottom: 5px;
    }

    .total {
        font-weight: bold;
        font-size: 16px;
    }

    .small {
        font-size: 12px;
    }
</style>
</head>
<body>

<div class="receipt">
    <div class="center">
        <h2>BURGER EXPRESS</h2>
        <p class="small">Hoofdstraat 12<br>1234 AB Amsterdam</p>
        <p class="small">Tel: 020-1234567</p>
    </div>

    <div class="divider"></div>

    <div class="small">
        Datum: 25-02-2026<br>
        Tijd: 18:42<br>
        Kassabon: 004582<br>
        Kassa: 02
    </div>

    <div class="divider"></div>

    <div class="item">
        <span>1x Cheeseburger</span>
        <span>€ 3,50</span>
    </div>
    <div class="item">
        <span>1x Grote Friet</span>
        <span>€ 2,80</span>
    </div>
    <div class="item">
        <span>1x Cola 0,5L</span>
        <span>€ 2,40</span>
    </div>

    <div class="divider"></div>

    <div class="item">
        <span>Subtotaal</span>
        <span>€ 8,70</span>
    </div>
    <div class="item">
        <span>BTW (9%)</span>
        <span>€ 0,78</span>
    </div>

    <div class="divider"></div>

    <div class="item total">
        <span>TOTAAL</span>
        <span>€ 9,48</span>
    </div>

    <div class="divider"></div>

    <div class="center small">
        Betaalmethode: PIN<br><br>
        Bedankt voor uw bezoek!<br>
        Tot ziens!
    </div>
</div>

</body>
</html>
